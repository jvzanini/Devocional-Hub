version: "3.7"

services:
  devocional_hub:
    image: ghcr.io/jvzanini/devocional-hub:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - rede_nexusAI
    environment:
      # ── Banco de Dados (reutiliza o postgres existente) ──────
      - DATABASE_URL=postgresql://postgres:YOUR_DB_PASSWORD@postgres:5432/devocional_hub?connection_limit=5&connect_timeout=30&pool_timeout=30

      # ── Auth ─────────────────────────────────────────────────
      - NEXTAUTH_SECRET=YOUR_NEXTAUTH_SECRET
      - NEXTAUTH_URL=https://devocional.nexusai360.com

      # ── Zoom ─────────────────────────────────────────────────
      - ZOOM_ACCOUNT_ID=YOUR_ZOOM_ACCOUNT_ID
      - ZOOM_CLIENT_ID=YOUR_ZOOM_CLIENT_ID
      - ZOOM_CLIENT_SECRET=YOUR_ZOOM_CLIENT_SECRET
      - ZOOM_RECURRING_MEETING_ID=YOUR_ZOOM_MEETING_ID
      - ZOOM_WEBHOOK_SECRET=YOUR_ZOOM_WEBHOOK_SECRET

      # ── Gemini (gratuito) ────────────────────────────────────
      - GEMINI_API_KEY=YOUR_GEMINI_API_KEY

      # ── Bíblia NVI ───────────────────────────────────────────
      - BIBLE_API_KEY=YOUR_BIBLE_API_KEY
      - BIBLE_NVI_ID=a556c5305ee15c3f-01

      # ── Storage local ────────────────────────────────────────
      - STORAGE_PATH=/app/data

      # ── Google (Playwright / NotebookLM) ─────────────────────
      - GOOGLE_EMAIL=YOUR_GOOGLE_EMAIL
      - GOOGLE_PASSWORD=YOUR_GOOGLE_PASSWORD

      # ── Admin ─────────────────────────────────────────────────
      - ADMIN_EMAIL=YOUR_ADMIN_EMAIL
      - ADMIN_PASSWORD=YOUR_ADMIN_PASSWORD

      # ── Email (Gmail SMTP) ─────────────────────────────────
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=YOUR_SMTP_USER
      - SMTP_PASS=YOUR_SMTP_PASS

      # ── App ──────────────────────────────────────────────────
      - NODE_ENV=production
      - TZ=America/Sao_Paulo

    volumes:
      - devocional_data:/app/data
      - devocional_playwright:/app/playwright-state

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        # HTTPS router (principal)
        - traefik.http.routers.devocional.rule=Host(`devocional.nexusai360.com`)
        - traefik.http.routers.devocional.entrypoints=websecure
        - traefik.http.routers.devocional.tls=true
        - traefik.http.routers.devocional.tls.certresolver=letsencryptresolver
        - traefik.http.routers.devocional.middlewares=devocional-headers
        # HTTP router (redirect para HTTPS)
        - traefik.http.routers.devocional-http.rule=Host(`devocional.nexusai360.com`)
        - traefik.http.routers.devocional-http.entrypoints=web
        - traefik.http.routers.devocional-http.middlewares=devocional-redirect
        - traefik.http.middlewares.devocional-redirect.redirectscheme.scheme=https
        - traefik.http.middlewares.devocional-redirect.redirectscheme.permanent=true
        # Service
        - traefik.http.services.devocional.loadbalancer.server.port=3000
        - traefik.http.services.devocional.loadbalancer.passHostHeader=true
        # Headers + HSTS (força HTTPS no browser)
        - traefik.http.middlewares.devocional-headers.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.middlewares.devocional-headers.headers.stsSeconds=31536000
        - traefik.http.middlewares.devocional-headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.devocional-headers.headers.forceSTSHeader=true
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

volumes:
  devocional_data:
    driver: local
  devocional_playwright:
    driver: local

networks:
  rede_nexusAI:
    external: true
    name: rede_nexusAI
