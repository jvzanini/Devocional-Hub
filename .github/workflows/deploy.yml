name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/devocional-hub

jobs:
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

      - name: Make package public (for Swarm pull)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH /user/packages/container/devocional-hub \
            -f visibility=public 2>/dev/null && echo "Package set to public" || echo "Could not change visibility"

  deploy:
    name: Deploy to Portainer
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout (for stack file)
        uses: actions/checkout@v4

      - name: Ensure GHCR registry and deploy stack
        run: |
          PORTAINER_URL="https://painel.nexusai360.com"
          API_KEY="${{ secrets.PORTAINER_TOKEN }}"
          STACK_ID="${{ secrets.PORTAINER_STACK_ID }}"

          # ── 1. Atualizar registry GHCR no Portainer ────────────────
          REGISTRIES=$(curl -s -H "X-API-Key: $API_KEY" "$PORTAINER_URL/api/registries")

          GHCR_ID=$(echo "$REGISTRIES" | python3 -c "
          import json, sys
          try:
            registries = json.load(sys.stdin)
            ghcr = [r for r in registries if 'ghcr.io' in r.get('URL', '')]
            print(ghcr[0]['Id'] if ghcr else '')
          except: print('')
          ")

          if [ -z "$GHCR_ID" ]; then
            echo "Criando registry GHCR no Portainer..."
            GHCR_RESULT=$(curl -s -X POST \
              -H "X-API-Key: $API_KEY" \
              -H "Content-Type: application/json" \
              "$PORTAINER_URL/api/registries" \
              -d "{
                \"Name\": \"GitHub Container Registry\",
                \"Type\": 6,
                \"URL\": \"ghcr.io\",
                \"BaseURL\": \"\",
                \"Authentication\": true,
                \"Username\": \"${{ github.actor }}\",
                \"Password\": \"${{ secrets.GITHUB_TOKEN }}\"
              }")
            GHCR_ID=$(echo "$GHCR_RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin).get('Id',''))")
            echo "Registry GHCR criado (ID: $GHCR_ID)"
          else
            echo "Registry GHCR já existe (ID: $GHCR_ID), atualizando token..."
            curl -s -X PUT \
              -H "X-API-Key: $API_KEY" \
              -H "Content-Type: application/json" \
              "$PORTAINER_URL/api/registries/$GHCR_ID" \
              -d "{
                \"Name\": \"GitHub Container Registry\",
                \"Type\": 6,
                \"URL\": \"ghcr.io\",
                \"BaseURL\": \"\",
                \"Authentication\": true,
                \"Username\": \"${{ github.actor }}\",
                \"Password\": \"${{ secrets.GITHUB_TOKEN }}\"
              }" > /dev/null
          fi

          echo "GHCR Registry ID: $GHCR_ID"

          # ── 2. Atualizar stack com registry ─────────────────────────
          STACK_CONTENT=$(cat portainer-stack.yml)

          ENV_JSON=$(python3 -c "
          import json
          env_vars = [
            {'name': 'DATABASE_URL', 'value': '${{ secrets.DATABASE_URL }}'},
            {'name': 'NEXTAUTH_SECRET', 'value': '${{ secrets.NEXTAUTH_SECRET }}'},
            {'name': 'ZOOM_ACCOUNT_ID', 'value': '${{ secrets.ZOOM_ACCOUNT_ID }}'},
            {'name': 'ZOOM_CLIENT_ID', 'value': '${{ secrets.ZOOM_CLIENT_ID }}'},
            {'name': 'ZOOM_CLIENT_SECRET', 'value': '${{ secrets.ZOOM_CLIENT_SECRET }}'},
            {'name': 'ZOOM_RECURRING_MEETING_ID', 'value': '${{ secrets.ZOOM_RECURRING_MEETING_ID }}'},
            {'name': 'ZOOM_WEBHOOK_SECRET', 'value': '${{ secrets.ZOOM_WEBHOOK_SECRET }}'},
            {'name': 'OPENAI_API_KEY', 'value': '${{ secrets.OPENAI_API_KEY }}'},
            {'name': 'OPENROUTER_API_KEY', 'value': '${{ secrets.OPENROUTER_API_KEY }}'},
            {'name': 'GEMINI_API_KEY', 'value': '${{ secrets.GEMINI_API_KEY }}'},
            {'name': 'GOOGLE_EMAIL', 'value': '${{ secrets.GOOGLE_EMAIL }}'},
            {'name': 'GOOGLE_PASSWORD', 'value': '${{ secrets.GOOGLE_PASSWORD }}'},
            {'name': 'ADMIN_EMAIL', 'value': '${{ secrets.ADMIN_EMAIL }}'},
            {'name': 'ADMIN_PASSWORD', 'value': '${{ secrets.ADMIN_PASSWORD }}'},
            {'name': 'SMTP_USER', 'value': '${{ secrets.SMTP_USER }}'},
            {'name': 'SMTP_PASS', 'value': '${{ secrets.SMTP_PASS }}'},
            {'name': 'DEPLOY_SHA', 'value': '${{ github.sha }}'},
            {'name': 'DEPLOY_TAG', 'value': 'sha-' + '${{ github.sha }}'[:7]},
          ]
          print(json.dumps(env_vars))
          ")

          # Payload com registries para autenticar o pull
          PAYLOAD=$(python3 -c "
          import json, sys
          stack = sys.stdin.read()
          env = json.loads('$ENV_JSON')
          payload = {
            'stackFileContent': stack,
            'env': env,
            'pullImage': True,
            'prune': True
          }
          # Adicionar registries se temos o ID
          registry_id = '$GHCR_ID'.strip()
          if registry_id.isdigit():
            payload['registries'] = [int(registry_id)]
          print(json.dumps(payload))
          " <<< "$STACK_CONTENT")

          # Enviar para Portainer
          RESULT=$(curl -s --max-time 120 -X PUT \
            -H "X-API-Key: $API_KEY" \
            -H "Content-Type: application/json" \
            "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=1" \
            -d "$PAYLOAD")

          echo "$RESULT" | python3 -c "
          import json, sys
          try:
            d = json.load(sys.stdin)
            if 'Id' in d:
              print('Deploy OK — Stack ID:', d.get('Id'), '| Status:', d.get('Status'))
            else:
              print('Erro no deploy:', json.dumps(d, indent=2))
              sys.exit(1)
          except:
            print('Resposta inesperada')
            sys.exit(1)
          "

          # ── 3. Forçar pull da imagem via Docker API do Portainer ────
          echo "Forçando pull da imagem..."
          DEPLOY_TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          curl -s -X POST \
            -H "X-API-Key: $API_KEY" \
            -H "Content-Type: application/json" \
            -H "X-Registry-Auth: $(echo -n '{"username":"${{ github.actor }}","password":"${{ secrets.GITHUB_TOKEN }}","serveraddress":"ghcr.io"}' | base64 -w0)" \
            "$PORTAINER_URL/api/endpoints/1/docker/images/create?fromImage=ghcr.io/jvzanini/devocional-hub&tag=$DEPLOY_TAG" \
            && echo "Pull da imagem $DEPLOY_TAG concluído"

          # ── 4. Forçar redeploy do service ───────────────────────────
          echo "Forçando atualização do service..."
          # Buscar o service ID
          SERVICES=$(curl -s -H "X-API-Key: $API_KEY" \
            "$PORTAINER_URL/api/endpoints/1/docker/services" \
            -G --data-urlencode 'filters={"name":["devocional"]}')

          SERVICE_INFO=$(echo "$SERVICES" | python3 -c "
          import json, sys
          services = json.load(sys.stdin)
          for s in services:
            if 'devocional' in s.get('Spec', {}).get('Name', ''):
              print(f\"{s['ID']}|{s['Version']['Index']}\")
              break
          ")

          if [ -n "$SERVICE_INFO" ]; then
            SERVICE_ID=$(echo "$SERVICE_INFO" | cut -d'|' -f1)
            SERVICE_VERSION=$(echo "$SERVICE_INFO" | cut -d'|' -f2)
            echo "Service: $SERVICE_ID (version: $SERVICE_VERSION)"

            # Forçar update do service com --force
            curl -s -X POST \
              -H "X-API-Key: $API_KEY" \
              -H "Content-Type: application/json" \
              -H "X-Registry-Auth: $(echo -n '{"username":"${{ github.actor }}","password":"${{ secrets.GITHUB_TOKEN }}","serveraddress":"ghcr.io"}' | base64 -w0)" \
              "$PORTAINER_URL/api/endpoints/1/docker/services/$SERVICE_ID/update?version=$SERVICE_VERSION&registryId=$GHCR_ID" \
              -d "{\"force\": true}" \
              && echo "Service force-updated"
          fi
