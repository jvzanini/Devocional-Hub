name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/devocional-hub

jobs:
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

  deploy:
    name: Deploy to Portainer
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout (for stack file)
        uses: actions/checkout@v4

      - name: Redeploy stack on Portainer
        run: |
          # Ler stack YAML do repositório (contém ${VAR} placeholders)
          STACK_CONTENT=$(cat portainer-stack.yml)

          # Montar array de variáveis de ambiente com credenciais reais (dos GitHub Secrets)
          # O Portainer substitui ${VAR} no YAML pelos valores do array Env
          ENV_JSON=$(python3 -c "
          import json
          env_vars = [
            {'name': 'DATABASE_URL', 'value': '${{ secrets.DATABASE_URL }}'},
            {'name': 'NEXTAUTH_SECRET', 'value': '${{ secrets.NEXTAUTH_SECRET }}'},
            {'name': 'ZOOM_ACCOUNT_ID', 'value': '${{ secrets.ZOOM_ACCOUNT_ID }}'},
            {'name': 'ZOOM_CLIENT_ID', 'value': '${{ secrets.ZOOM_CLIENT_ID }}'},
            {'name': 'ZOOM_CLIENT_SECRET', 'value': '${{ secrets.ZOOM_CLIENT_SECRET }}'},
            {'name': 'ZOOM_RECURRING_MEETING_ID', 'value': '${{ secrets.ZOOM_RECURRING_MEETING_ID }}'},
            {'name': 'ZOOM_WEBHOOK_SECRET', 'value': '${{ secrets.ZOOM_WEBHOOK_SECRET }}'},
            {'name': 'GEMINI_API_KEY', 'value': '${{ secrets.GEMINI_API_KEY }}'},
            {'name': 'BIBLE_API_KEY', 'value': '${{ secrets.BIBLE_API_KEY }}'},
            {'name': 'GOOGLE_EMAIL', 'value': '${{ secrets.GOOGLE_EMAIL }}'},
            {'name': 'GOOGLE_PASSWORD', 'value': '${{ secrets.GOOGLE_PASSWORD }}'},
            {'name': 'ADMIN_EMAIL', 'value': '${{ secrets.ADMIN_EMAIL }}'},
            {'name': 'ADMIN_PASSWORD', 'value': '${{ secrets.ADMIN_PASSWORD }}'},
            {'name': 'SMTP_USER', 'value': '${{ secrets.SMTP_USER }}'},
            {'name': 'SMTP_PASS', 'value': '${{ secrets.SMTP_PASS }}'},
            {'name': 'DEPLOY_SHA', 'value': '${{ github.sha }}'},
            {'name': 'DEPLOY_TAG', 'value': 'sha-' + '${{ github.sha }}'[:7]},
          ]
          print(json.dumps(env_vars))
          ")

          # Montar payload com stack + env vars
          PAYLOAD=$(python3 -c "
          import json, sys
          stack = sys.stdin.read()
          env = json.loads('$ENV_JSON')
          payload = {
            'stackFileContent': stack,
            'env': env,
            'pullImage': True,
            'prune': True
          }
          print(json.dumps(payload))
          " <<< "$STACK_CONTENT")

          # Enviar para Portainer
          RESULT=$(curl -s --max-time 120 -X PUT \
            -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://painel.nexusai360.com/api/stacks/${{ secrets.PORTAINER_STACK_ID }}?endpointId=1" \
            -d "$PAYLOAD")

          echo "$RESULT" | python3 -c "
          import json, sys
          try:
            d = json.load(sys.stdin)
            if 'Id' in d:
              print('Deploy OK — Stack ID:', d.get('Id'), '| Status:', d.get('Status'))
            else:
              print('Erro no deploy:', json.dumps(d, indent=2))
              sys.exit(1)
          except:
            print('Resposta inesperada')
            sys.exit(1)
          "
