name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/devocional-hub

jobs:
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true

  deploy:
    name: Deploy to Portainer
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout (for stack file)
        uses: actions/checkout@v4

      - name: Redeploy stack on Portainer
        run: |
          STACK_CONTENT=$(curl -s \
            -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            "https://painel.nexusai360.com/api/stacks/${{ secrets.PORTAINER_STACK_ID }}/file" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['StackFileContent'])")

          PAYLOAD=$(python3 -c "
          import json, sys
          content = sys.stdin.read()
          print(json.dumps({'stackFileContent': content, 'pullImage': True, 'prune': False}))
          " <<< "$STACK_CONTENT")

          curl -s -X PUT \
            -H "X-API-Key: ${{ secrets.PORTAINER_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://painel.nexusai360.com/api/stacks/${{ secrets.PORTAINER_STACK_ID }}?endpointId=1" \
            -d "$PAYLOAD" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('Deploy OK, status:', d.get('Status'))"
