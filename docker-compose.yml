version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devocional_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devocional
      POSTGRES_PASSWORD: devocional123
      POSTGRES_DB: devocional_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devocional -d devocional_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
